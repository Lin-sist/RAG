server:
  port: 8080

spring:
  application:
    name: rag-qa-system
  
  profiles:
    active: dev

  datasource:
    url: jdbc:mysql://localhost:3307/rag_qa?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 30000
      pool-name: RagQaHikariCP
      max-lifetime: 1800000
      connection-timeout: 30000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0

  data:
    redis:
      host: localhost
      port: 6380
      password: root
      database: 0
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.enterprise.rag.**.entity
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# JWT Configuration
jwt:
  secret: your-256-bit-secret-key-for-jwt-token-generation-change-in-production
  access-token-expiration: 3600000  # 1 hour in milliseconds
  refresh-token-expiration: 604800000  # 7 days in milliseconds

# Logging
logging:
  level:
    root: INFO
    com.enterprise.rag: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{traceId}] %-5level %logger{36} - %msg%n"

# OpenAPI/Swagger
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

# RAG Configuration
rag:
  llm:
    # provider: openai # or qwen
    provider: qwen
    qwen:
      # 请在这里填入你的通义千问 API Key
      api-key: sk-6d373e0b7b36413f7791d476de5c10dd2203791e08ed5f375639dd3ddd1e48d8
      model: qwen-turbo
    openai:
      api-key: sk-xxxxxxxxxxxxxxxxxxxxxxxxxx

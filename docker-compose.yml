version: '3.8'

networks:
  rag-net:
    driver: bridge

services:
  # MySQL 8.0 数据库
  mysql:
    image: mysql:8.0
    container_name: rag-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: rag_qa
      TZ: Asia/Shanghai
    ports:
      - "3307:3306"
    volumes:
      - ./data/mysql:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 7 缓存数据库
  redis:
    image: redis:7-alpine
    container_name: rag-redis
    restart: always
    command: redis-server --requirepass root --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - ./data/redis:/data
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "root", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # MinIO 对象存储 (应用文件 + Milvus 向量数据共用)
  minio:
    image: minio/minio:latest
    container_name: rag-minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API 端口
      - "9001:9001"   # Console 端口
    volumes:
      - ./data/minio:/data
    command: server /data --console-address ":9001"
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # etcd - Milvus 元数据存储
  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: rag-etcd
    restart: always
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ./data/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    networks:
      - rag-net
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Milvus Standalone 向量数据库
  milvus:
    image: milvusdb/milvus:v2.3.4
    container_name: rag-milvus
    restart: always
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
      MINIO_ACCESS_KEY_ID: minioadmin
      MINIO_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "19530:19530"  # gRPC 端口
      - "9091:9091"    # Metrics 端口
    volumes:
      - ./data/milvus:/var/lib/milvus
    command: ["milvus", "run", "standalone"]
    networks:
      - rag-net
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 20s
      retries: 5

  # Attu - Milvus 可视化管理工具 (可选)
  attu:
    image: zilliz/attu:latest
    container_name: rag-attu
    restart: always
    environment:
      MILVUS_URL: milvus:19530
    ports:
      - "3001:3000"
    networks:
      - rag-net
    depends_on:
      - milvus
